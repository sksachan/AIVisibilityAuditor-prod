# Extraction manifest signals produced by scripts/local_hybrid_scraper.py.
# 07_score_pages.py reads these signals alongside markdown so scoring is based on
# evidence availability, not raw text length alone.
extraction_manifest_alignment:
  required_for_confident_scoring:
    - geo_analysis_ready
    - extraction_metrics.markdown_chars
    - content_regions.full_markdown_chars
    - content_regions.main_chars
    - content_regions.footer_chars
    - extraction_metrics.heading_count
    - extraction_metrics.link_count
    - extraction_metrics.image_count
    - extraction_metrics.pdf_link_count
    - extraction_metrics.numeric_fact_count
    - geo_signals.answer_first
    - geo_signals.extractable_passages
    - geo_signals.low_noise_ratio
    - geo_signals.domain_specific_terms
    - geo_signals.comparison_terms
    - geo_signals.source_citations
    - geo_signals.pdf_or_spec_links
    - geo_signals.image_alt_evidence
    - geo_signals.schema_json_ld
    - geo_signals.schema_types
    - metadata.schema_types
    - geo_signals.canonical
    - geo_signals.meta_description
    - geo_signals.robots_indexable
  blocked_page_policy: exclude_from_content_score
  blocked_status_codes: [401, 403, 429]
  note: >-
    Blocked, failed or partial extraction pages are preserved as evidence but are excluded from
    content-quality scoring so external medians are not distorted by access
    failure. Owned blocked pages should be treated as technical accessibility
    findings.
